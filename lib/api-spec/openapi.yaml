openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI explanation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/explain:
    post:
      operationId: explainQuestion
      tags: [ai]
      summary: Stream a friendly homework explanation
      description: |
        Accepts a single question (optionally with a photo and grade/subject context)
        OR a conversation history of prior turns, and returns a Server-Sent Events
        stream of explanation chunks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainRequestBody"
      responses:
        "200":
          description: SSE stream of explanation chunks
          content:
            text/event-stream: {}
  /ai/transcribe:
    post:
      operationId: transcribeAudio
      tags: [ai]
      summary: Transcribe a short voice recording into text
      description: Converts a base64-encoded audio recording into transcribed text using speech-to-text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscribeRequestBody"
      responses:
        "200":
          description: Transcription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChatTurn:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        hasImage:
          type: boolean
        imageBase64:
          type: string
          description: Base64 image attached to this user turn (only allowed on the latest user turn).
      required:
        - role
        - content
    ExplainRequestBody:
      type: object
      properties:
        question:
          type: string
          description: The homework question text (single-turn shortcut). Can be empty if an image is provided.
        subject:
          type: string
          description: Optional subject (e.g. Math, Science, History).
        gradeLevel:
          type: string
          description: Optional grade level (e.g. Grade 5, High School).
        language:
          type: string
          enum: [english, hinglish, telugu, telugu_roman]
          description: Preferred response language style.
        imageBase64:
          type: string
          description: Optional base64-encoded JPEG/PNG of the homework problem (single-turn shortcut).
        messages:
          type: array
          description: |
            Multi-turn conversation history. When present, takes precedence over `question`/`imageBase64`.
            The last item should be the latest user turn.
          items:
            $ref: "#/components/schemas/ChatTurn"
    TranscribeRequestBody:
      type: object
      properties:
        audioBase64:
          type: string
          description: Base64-encoded audio recording (m4a, webm, wav, mp3, or ogg).
        format:
          type: string
          description: Optional hint about the source format (m4a, webm, wav, mp3, ogg). Auto-detected if absent.
        language:
          type: string
          enum: [english, hinglish, telugu, telugu_roman]
          description: Preferred language hint for transcription.
      required:
        - audioBase64
    TranscribeResponse:
      type: object
      properties:
        text:
          type: string
      required:
        - text
